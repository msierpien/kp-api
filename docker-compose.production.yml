x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: personalization-db
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: ${DB_NAME:-personalization}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Nie eksponuj portu na zewnątrz - tylko wewnętrzna sieć Dockera

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: personalization-redis
    restart: unless-stopped
    logging: *default-logging
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    # Nie eksponuj portu na zewnątrz - tylko wewnętrzna sieć Dockera

  # Fastify API
  api:
    image: kp-api-app:production
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: personalization-api
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "127.0.0.1:${API_PORT:-3001}:3001"  # Tylko localhost - Nginx jest reverse proxy
    environment: &api-environment
      NODE_ENV: production
      RUNTIME_ROLE: api
      API_PORT: 3001
      API_HOST: 0.0.0.0
      # Database
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-personalization}?schema=public
      ANALYTICS_MONGO_URI: ${ANALYTICS_MONGO_URI:-}
      ANALYTICS_MONGO_DB: ${ANALYTICS_MONGO_DB:-appdb}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # JWT
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      # Encryption
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      # Webhook
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      # Email (produkcja - prawdziwy SMTP)
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      AUTO_SEND_EMAILS: ${AUTO_SEND_EMAILS:-true}
      # URLs (wymagane dla CORS i generowania linków)
      APP_URL: ${APP_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      PUBLIC_PORTAL_BASE_URL: ${PUBLIC_PORTAL_BASE_URL}
      # Storage
      STORAGE_PATH: /app/storage
      PUBLIC_STORAGE_URL: ${APP_URL}
      PRICE_SYNC_MAX_AUTO_CHANGE_PERCENT: ${PRICE_SYNC_MAX_AUTO_CHANGE_PERCENT:-20}
      PRICE_SYNC_MAX_AUTO_BATCH: ${PRICE_SYNC_MAX_AUTO_BATCH:-200}
    volumes:
      - api_storage:/app/storage  # Trwały wolumin dla plików
    networks:
      - default
      - analytics_data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    image: kp-api-app:production
    container_name: personalization-worker
    restart: unless-stopped
    logging: *default-logging
    environment:
      <<: *api-environment
      RUNTIME_ROLE: worker
    volumes:
      - api_storage:/app/storage
    networks:
      - default
      - analytics_data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    image: kp-api-app:production
    container_name: personalization-scheduler
    restart: unless-stopped
    logging: *default-logging
    environment:
      <<: *api-environment
      RUNTIME_ROLE: scheduler
    volumes:
      - api_storage:/app/storage
    networks:
      - default
      - analytics_data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  migrate:
    image: kp-api-migrate:production
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    container_name: personalization-migrate
    profiles:
      - maintenance
    restart: "no"
    logging: *default-logging
    environment:
      <<: *api-environment
      RUNTIME_ROLE: migrate
    networks:
      - default
      - analytics_data
    depends_on:
      postgres:
        condition: service_healthy
    command: pnpm prisma migrate deploy

networks:
  analytics_data:
    external: true
    name: kp-data_default

volumes:
  postgres_data:
  redis_data:
  api_storage:
